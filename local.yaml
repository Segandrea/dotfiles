---
- name: Fedora workstation setup
  hosts: localhost
  connection: local
  become: true

  vars:
    hostname_name: hornet
    flathub_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    cli_packages:
      - bat
      - calibre
      - dconf
      - fd-find
      - fzf
      - git
      - ncompress
      - neovim
      - openssl
      - p7zip-plugins
      - rustup
      - scrcpy
      - starship
      - stow
      - tealdeer
      - tmux
      - unrar
      - vim
      - zoxide

    gnome_packages:
      - gnome-shell-extension-pop-shell
      - gnome-shell-extension-screen-autorotate
      - gnome-tweaks
      - lm_sensors

    app_packages:
      - alacritty
      - kitty

    stow_dirs:
      - alacritty
      - autostart
      - bash
      - fd
      - gitconfig
      - gtk
      - nvim
      - ideavim
      - readline
      - scripts
      - starship
      - tmux
      - vim

    flatpaks:
      - it.mijorus.gearlever
      - com.mattjakeman.ExtensionManager
      - org.gnome.Extensions
      - com.spotify.Client
      - org.telegram.desktop
      - com.stremio.Stremio
      - com.github.tchx84.Flatseal

  pre_tasks:

    - name: Verify Fedora
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Fedora"
        fail_msg: "This playbook only supports Fedora"

    - name: Configure DNF
      ansible.builtin.blockinfile:
        path: /etc/dnf/dnf.conf
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        insertafter: '^\[main\]'
        block: |
          fastestmirror=True
          max_parallel_downloads=10
          defaultyes=True
          keepcache=True

    - name: Upgrade system
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: true

  tasks:

    - name: Install RPM Fusion Free
      ansible.builtin.dnf:
        name: "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm"
        disable_gpg_check: true
        state: present

    - name: Install RPM Fusion Nonfree
      ansible.builtin.dnf:
        name: "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"
        disable_gpg_check: true
        state: present

    - name: Upgrade core group
      ansible.builtin.command:
        cmd: dnf -y group upgrade core
      changed_when: false

    - name: Install core group
      ansible.builtin.command:
        cmd: dnf -y group install core
      changed_when: false

    - name: Install multimedia group
      ansible.builtin.command:
        cmd: dnf -y group install multimedia
      changed_when: false

    - name: Replace ffmpeg-free with ffmpeg
      ansible.builtin.command:
        cmd: dnf -y swap ffmpeg-free ffmpeg --allowerasing
      changed_when: false

    - name: Install sound and video group
      ansible.builtin.command:
        cmd: dnf -y group install sound-and-video
      changed_when: false

    - name: Install video acceleration packages
      ansible.builtin.dnf:
        name:
          - ffmpeg-libs
          - libva
          - libva-utils
          - mesa-va-drivers-freeworld
          - mesa-va-drivers-freeworld.i686
        state: present

    - name: Install OpenH264 packages
      ansible.builtin.dnf:
        name:
          - openh264
          - gstreamer1-plugin-openh264
          - mozilla-openh264
        state: present

    - name: Enable Cisco OpenH264 repo
      ansible.builtin.command:
        cmd: dnf config-manager setopt fedora-cisco-openh264.enabled=1
      changed_when: false

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ hostname_name }}"

    - name: Enable Flathub
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: "{{ flathub_url }}"

    - name: Install fuse libs
      ansible.builtin.dnf:
        name: fuse-libs
        state: present

    - name: Enable Starship COPR
      ansible.builtin.command:
        cmd: dnf -y copr enable atim/starship
      changed_when: false

    - name: Enable Scrcpy COPR
      ansible.builtin.command:
        cmd: dnf -y copr enable zeno/scrcpy
      changed_when: false

    - name: Install CLI packages
      ansible.builtin.dnf:
        name: "{{ cli_packages }}"
        state: present

    - name: Install GNOME packages
      ansible.builtin.dnf:
        name: "{{ gnome_packages }}"
        state: present

    - name: Enable Terra repository
      ansible.builtin.command:
        cmd: >
          dnf -y install --nogpgcheck
          --repofrompath terra,https://repos.fyralabs.com/terra$releasever
          terra-release
      changed_when: false

    - name: Install applications
      ansible.builtin.dnf:
        name: "{{ app_packages }}"
        state: present

    - name: Install Flatpaks
      community.general.flatpak:
        name: "{{ item }}"
        remote: flathub
        state: present
      loop: "{{ flatpaks }}"

    - name: Stow dotfiles
      become: false
      ansible.builtin.command:
        cmd: "stow --target={{ ansible_env.HOME }} -S {{ item }}"
        chdir: "{{ playbook_dir }}"
      loop: "{{ stow_dirs }}"
